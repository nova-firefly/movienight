name: Deploy Test Branch

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ${{ github.repository }}
  BACKEND_IMAGE: ${{ github.repository }}-backend

jobs:
  build-and-push:
    name: Build and Push Test Images
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build timestamp
        id: timestamp
        run: echo "value=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_GIT_BRANCH=${{ github.head_ref || github.ref_name }}
            REACT_APP_GIT_HASH=${{ github.sha }}
            REACT_APP_DEPLOY_TIME=${{ steps.timestamp.outputs.value }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to movienight-test
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NOVA_HOST }}
          username: ${{ secrets.NOVA_USER }}
          key: ${{ secrets.NOVA_SSH_KEY }}
          port: ${{ secrets.NOVA_SSH_PORT || 22 }}
          script: |
            NOVA_DIR="${{ secrets.NOVA_CONFIG_PATH }}"
            BRANCH="${{ github.head_ref || github.ref_name }}"
            COMPOSE_FILE="$NOVA_DIR/docker-compose.movienight-test.yaml"

            # Update movienight submodule to the feature branch
            cd "$NOVA_DIR/movienight"
            git fetch origin
            git checkout "$BRANCH"
            git pull origin "$BRANCH"

            # Login and pull new test images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f "$COMPOSE_FILE" pull

            # Restart with new images
            docker compose -f "$COMPOSE_FILE" up -d

            # Verify
            if docker ps | grep -q movienight-test; then
              echo "Deployment successful - movienight-test is running"
              docker ps | grep movienight-test
            else
              echo "Deployment failed"
              docker compose -f "$COMPOSE_FILE" logs --tail=50
              exit 1
            fi

      - name: Deployment summary
        if: success()
        run: |
          echo "### Test Deployment Successful! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.head_ref || github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend:** \`${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:test\`" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** \`${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:test\`" >> $GITHUB_STEP_SUMMARY
