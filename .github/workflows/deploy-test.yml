name: Deploy Test Branch

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ${{ github.repository }}
  BACKEND_IMAGE: ${{ github.repository }}-backend

jobs:
  build-and-push:
    name: Build and Push Test Images
    runs-on: ubuntu-latest
    # Fork-PR guard: only run for PRs from branches in this repo. Movienight is
    # private today so this is defensive — protects against an accidental
    # visibility flip letting a fork PR reach the runner.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build timestamp
        id: timestamp
        run: echo "value=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Build and push frontend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_GIT_BRANCH=${{ github.head_ref || github.ref_name }}
            REACT_APP_GIT_HASH=${{ github.sha }}
            REACT_APP_DEPLOY_TIME=${{ steps.timestamp.outputs.value }}

      - name: Build and push backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to movienight-test
    needs: build-and-push
    runs-on: [self-hosted, nova, movienight-test]
    timeout-minutes: 10
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy
        env:
          NOVA_DIR: ${{ vars.NOVA_CONFIG_PATH }}
          COMPOSE_FILE: ${{ vars.COMPOSE_FILE_TEST }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd "$NOVA_DIR"

          # Write GHCR creds directly to Docker config.json instead of running
          # `docker login`. login POSTs to the daemon's /auth endpoint, which
          # runners-socket-proxy denies (AUTH toggle intentionally off — the
          # runner's blast radius stays narrow). `docker compose pull` reads
          # config.json for registry auth, so we get GHCR access without ever
          # touching /auth. Config lives in the ephemeral runner and is thrown
          # away with the container at end-of-job.
          mkdir -p "$HOME/.docker"
          umask 077
          AUTH_B64=$(printf '%s:%s' "$GHCR_USER" "$GHCR_TOKEN" | base64 -w 0)
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}\n' "$AUTH_B64" > "$HOME/.docker/config.json"

          docker compose -f "$COMPOSE_FILE" pull
          docker compose -f "$COMPOSE_FILE" up -d --force-recreate

          # Verify frontend + backend are running (db is separately managed)
          sleep 5
          for svc in movienight-test-frontend movienight-test-backend; do
            STATUS=$(docker inspect --format '{{.State.Status}}' "$svc" 2>/dev/null || echo "missing")
            if [ "$STATUS" != "running" ]; then
              echo "FAIL: $svc is $STATUS"
              docker compose -f "$COMPOSE_FILE" logs --tail=30 "$svc" || true
              exit 1
            fi
          done
          echo "Deployment successful"
          docker compose -f "$COMPOSE_FILE" ps

      - name: Deployment summary
        if: success()
        run: |
          echo "### Test Deployment Successful! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.head_ref || github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend:** \`${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:test\`" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** \`${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:test\`" >> $GITHUB_STEP_SUMMARY
