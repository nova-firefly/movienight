name: Deploy to Remote Docker Host

on:
  push:
    branches:
      - master
  workflow_dispatch:  # Allow manual triggers from GitHub UI

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ${{ github.repository }}
  BACKEND_IMAGE: ${{ github.repository }}-backend

jobs:
  build-push-frontend:
    name: Build and Push Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (frontend)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set build timestamp
        id: timestamp
        run: echo "value=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          build-args: |
            REACT_APP_GIT_BRANCH=${{ github.ref_name }}
            REACT_APP_GIT_HASH=${{ github.sha }}
            REACT_APP_DEPLOY_TIME=${{ steps.timestamp.outputs.value }}

  build-push-backend:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  deploy:
    name: Deploy via Nova Compose
    needs: [build-push-frontend, build-push-backend]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to nova host via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NOVA_HOST }}
          username: ${{ secrets.NOVA_USER }}
          key: ${{ secrets.NOVA_SSH_KEY }}
          port: ${{ secrets.NOVA_SSH_PORT || 22 }}
          script: |
            NOVA_DIR="${{ secrets.NOVA_CONFIG_PATH }}"
            COMPOSE_FILE="$NOVA_DIR/docker-compose.movienight.yaml"

            # Ensure host has latest nova-config compose files
            cd "$NOVA_DIR"
            git fetch origin
            git reset --hard origin/main

            # Login to GHCR and pull new images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f "$COMPOSE_FILE" pull movienight-frontend movienight-backend

            # Restart with new images
            docker compose -f "$COMPOSE_FILE" up -d

            # Clean up dangling images
            docker image prune -f

            # Verify all containers are running
            sleep 5
            for svc in movienight-frontend movienight-backend movienight-db; do
              STATUS=$(docker inspect --format '{{.State.Status}}' "$svc" 2>/dev/null || echo "missing")
              if [ "$STATUS" != "running" ]; then
                echo "FAIL: $svc is $STATUS"
                docker compose -f "$COMPOSE_FILE" logs --tail=30 "$svc"
                exit 1
              fi
            done
            echo "Deployment successful"
            docker compose -f "$COMPOSE_FILE" ps

      - name: Deployment summary
        if: success()
        run: |
          echo "### Deployment Successful! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend:** \`${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** \`${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Host:** \`${{ secrets.NOVA_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
