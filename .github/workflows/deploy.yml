name: Deploy to Remote Docker Host

on:
  push:
    branches:
      - master
  workflow_dispatch:  # Allow manual triggers from GitHub UI

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ${{ github.repository }}
  BACKEND_IMAGE: ${{ github.repository }}-backend

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (frontend)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_GIT_BRANCH=${{ github.ref_name }}
            REACT_APP_GIT_HASH=${{ github.sha }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "${{ steps.meta.outputs.tags }}"

  deploy:
    name: Deploy via Nova Compose
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to nova host via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT || 22 }}
          script: |
            NOVA_DIR="${{ secrets.NOVA_CONFIG_PATH }}"
            COMPOSE_FILE="$NOVA_DIR/docker-compose.movienight.yaml"

            # Update movienight submodule to latest master (picks up backend changes)
            cd "$NOVA_DIR"
            git submodule update --remote movienight

            # Login to GHCR so compose can pull the new frontend image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # postgres:18rc1-trixie changed VOLUME /var/lib/postgresql/data to
            # VOLUME /var/lib/postgresql.  Docker mounts an empty anonymous volume
            # at the parent path; the named volume mount at /var/lib/postgresql/data
            # then fails with "no such file or directory" — db stays in Created and
            # backend loops.  Pin to postgres:15-alpine three ways so it sticks even
            # if a nova watcher re-runs docker compose without our override:
            #  1. Patch compose file directly (persists across future auto-runs)
            #  2. Patch any .env files in NOVA_DIR that might set the image via variable
            #  3. Override file as final fallback for unknown compose structures
            sed -i 's/postgres:18rc1-trixie/postgres:15-alpine/g' "$COMPOSE_FILE" 2>/dev/null || true
            sed -i 's/postgres:18rc1-trixie/postgres:15-alpine/g' "$NOVA_DIR"/.env "$NOVA_DIR"/*.env 2>/dev/null || true

            OVERRIDE_FILE="$NOVA_DIR/docker-compose.movienight.db-override.yaml"
            echo "services:"                            >  "$OVERRIDE_FILE"
            echo "  movienight-db:"                    >> "$OVERRIDE_FILE"
            echo "    image: postgres:15-alpine"       >> "$OVERRIDE_FILE"

            # Pull new images
            docker compose -f "$COMPOSE_FILE" -f "$OVERRIDE_FILE" pull

            # Gracefully stop db so postgres can remove postmaster.pid cleanly;
            # docker rm -f (SIGKILL) leaves postmaster.pid with PID 1, which the
            # next container's init also runs as, causing postgres to think another
            # instance is already running and enter a restart loop.
            docker stop movienight-db 2>/dev/null || true
            docker rm movienight-db 2>/dev/null || true

            # Restart all services with new images
            docker compose -f "$COMPOSE_FILE" -f "$OVERRIDE_FILE" up -d

            # Hard-fail if DB ended up on wrong image — catches cases where a nova
            # watcher recreated the container after our compose up.
            DB_IMAGE=$(docker inspect movienight-db --format '{{.Config.Image}}' 2>/dev/null || echo "missing")
            if echo "$DB_IMAGE" | grep -q "18rc"; then
              echo "ERROR: movienight-db is still using $DB_IMAGE after deploy."
              echo "Compose effective config for db:"
              docker compose -f "$COMPOSE_FILE" -f "$OVERRIDE_FILE" config 2>&1 | grep -A5 "movienight-db:" | head -20
              exit 1
            fi
            echo "DB image OK: $DB_IMAGE"

            # Clean up dangling images
            docker image prune -f

            # Verify frontend container is running
            if docker ps | grep -q movienight-frontend; then
              echo "Deployment successful - movienight-frontend is running"
              docker ps | grep movienight
            else
              echo "Deployment failed - movienight-frontend is not running"
              docker compose -f "$COMPOSE_FILE" logs --tail=50
              exit 1
            fi

      - name: Deployment summary
        if: success()
        run: |
          echo "### Deployment Successful! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend:** \`${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** \`${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Host:** \`${{ secrets.REMOTE_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
