version: '3.8'

services:
  # Development environment services (from dev branch)
  db:
    image: postgres:15-alpine
    container_name: movienight-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    profiles:
      - development

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: movienight-backend
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: ${BACKEND_PORT}
      NODE_ENV: development
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      KOMETA_COLLECTIONS_PATH: ${KOMETA_COLLECTIONS_PATH:-}
      KOMETA_TRIGGER_URL: ${KOMETA_TRIGGER_URL:-}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@movienight.local}
      APP_URL: ${APP_URL:-http://localhost:3000}
      DB_BACKUP_PATH: ${DB_BACKUP_PATH:-/backups}
      DB_BACKUP_SCHEDULE: ${DB_BACKUP_SCHEDULE:-daily}
      DB_BACKUP_TIME: ${DB_BACKUP_TIME:-03:00}
      DB_BACKUP_KEEP_DAYS: ${DB_BACKUP_KEEP_DAYS:-7}
    volumes:
      - db_backups:/backups
    ports:
      - '${BACKEND_EXTERNAL_PORT}:${BACKEND_PORT}'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
      - frontend
    profiles:
      - development

  frontend:
    image: node:18-alpine
    container_name: movienight-frontend
    working_dir: /app
    environment:
      REACT_APP_GRAPHQL_URL: ${REACT_APP_GRAPHQL_URL:-}
    ports:
      - '${FRONTEND_EXTERNAL_PORT}:3000'
    depends_on:
      - backend
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm start"
    restart: unless-stopped
    networks:
      - frontend
    profiles:
      - development

  # Production deployment service (from pipeline changes)
  movienight:
    # Replace USERNAME/REPO with your GitHub repository
    # Example: ghcr.io/johndoe/movienight:latest
    image: ghcr.io/${GITHUB_REPOSITORY:-username/movienight}:latest
    container_name: movienight
    restart: unless-stopped
    ports:
      - '8080:80'
    environment:
      - TZ=America/New_York
      - NODE_ENV=production
      - KOMETA_COLLECTIONS_PATH=${KOMETA_COLLECTIONS_PATH:-}
      - KOMETA_TRIGGER_URL=${KOMETA_TRIGGER_URL:-}
      - DB_BACKUP_PATH=${DB_BACKUP_PATH:-/backups}
      - DB_BACKUP_SCHEDULE=${DB_BACKUP_SCHEDULE:-daily}
      - DB_BACKUP_TIME=${DB_BACKUP_TIME:-03:00}
      - DB_BACKUP_KEEP_DAYS=${DB_BACKUP_KEEP_DAYS:-7}
    volumes:
      - db_backups:/backups
    networks:
      - frontend
    labels:
      - 'com.movienight.app=true'
      - 'com.movienight.version=1.0'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    profiles:
      - production

volumes:
  postgres_data:
  db_backups:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
  default:
    name: movienight-network
